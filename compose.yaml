services:

  # ---------------- REDIS ----------------
  redis:
    image: redis:7-alpine
    container_name: rm-redis
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - rm-network

  # ---------------- POSTGRES ----------------
  postgres:
    image: postgres:18-alpine
    container_name: rm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rm-network

  # ---------------- IDENTITY API ----------------
  identity-api:
    build:
      context: .
      dockerfile: ./Modules/Identity/Identity.API/Dockerfile
    container_name: rm-identity-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Redis__Configuration: redis:6379
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    networks:
      - rm-network

  # ---------------- EXTERNAL API ----------------
  external-api:
    build:
      context: .
      dockerfile: ./RoomManagerment.ExternalApi/Dockerfile
    container_name: rm-external-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
    restart: unless-stopped
    networks:
      - rm-network

  # ---------------- GATEWAY ----------------
  gateway:
    build:
      context: .
      dockerfile: ./RoomManagerment.Gateway/.Dockerfile
    container_name: rm-gateway
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - identity-api
      - external-api
    networks:
      - rm-network

    
  # ---------------- NGINX ----------------
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: rm-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      # Nginx configuration variables
      WORKER_PROCESSES: ${NGINX_WORKER_PROCESSES:-auto}
      WORKER_CONNECTIONS: ${NGINX_WORKER_CONNECTIONS:-4096}
      ACCESS_LOG_PATH: ${NGINX_ACCESS_LOG_PATH:-/var/log/nginx/access.log}
      ERROR_LOG_PATH: ${NGINX_ERROR_LOG_PATH:-/var/log/nginx/error.log}
      LOG_LEVEL: ${NGINX_LOG_LEVEL:-warn}
      GZIP_ENABLED: ${NGINX_GZIP_ENABLED:-on}
      GZIP_MIN_LENGTH: ${NGINX_GZIP_MIN_LENGTH:-1024}
      RATE_LIMIT: ${NGINX_RATE_LIMIT:-10r/s}
      CLIENT_BODY_TIMEOUT: ${NGINX_CLIENT_BODY_TIMEOUT:-10s}
      CLIENT_HEADER_TIMEOUT: ${NGINX_CLIENT_HEADER_TIMEOUT:-10s}
      KEEPALIVE_TIMEOUT: ${NGINX_KEEPALIVE_TIMEOUT:-65s}
      SEND_TIMEOUT: ${NGINX_SEND_TIMEOUT:-10s}
      CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-50M}
    volumes:
      # CHỈ mount logs và ssl, KHÔNG mount nginx.conf nữa (được generate từ template)
      - ./docker/nginx/logs:/var/log/nginx
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      # Nếu có conf.d riêng, mount vào
      # - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped
    depends_on:
      - gateway
    networks:
      - rm-network

networks:
  rm-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
