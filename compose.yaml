services:

  # ---------------- REDIS ----------------
  redis:
    image: redis:7-alpine
    container_name: rm-redis
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rm-network

  # ---------------- RABBITMQ ----------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rm-network

  # ---------------- POSTGRES ----------------
  postgres:
    image: postgres:18-alpine
    container_name: rm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rm-network

  # ---------------- IDENTITY API (legacy — tắt, dùng Auth thay thế) ----------------
  # identity-api:
  #   build:
  #     context: .
  #     dockerfile: ./Modules/Identity/Identity.API/Dockerfile
  #   container_name: rm-identity-api
  #   environment:
  #     ASPNETCORE_URLS: http://0.0.0.0:8080
  #     ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
  #     Redis__Configuration: redis:6379
  #     RabbitMq__Host: rabbitmq
  #     RabbitMq__Port: 5672
  #     RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
  #     RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
  #     RabbitMq__VirtualHost: /
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     rabbitmq:
  #       condition: service_healthy
  #   security_opt:
  #     - no-new-privileges:true
  #   networks:
  #     - rm-network

  # ---------------- AUTH API (5002) ----------------
  auth-api:
    build:
      context: .
      dockerfile: ./Modules/Auth/Auth.API/Dockerfile
    container_name: rm-auth-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:${AUTH_API_PORT:-5002}
      ConnectionStrings__Auth: Host=postgres;Port=5432;Database=${AUTH_DB:-roommanager_auth};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Redis__Configuration: ${REDIS_CONFIGURATION:-redis:6379}
      EmailSettings__Host: ${EMAIL_HOST:-smtp.gmail.com}
      EmailSettings__Port: ${EMAIL_PORT:-587}
      EmailSettings__Username: ${EMAIL_USERNAME:-}
      EmailSettings__Password: ${EMAIL_PASSWORD:-}
      EmailSettings__EnableSsl: ${EMAIL_ENABLE_SSL:-true}
      EmailSettings__FromEmail: ${EMAIL_FROM_EMAIL:-}
      EmailSettings__FromName: ${EMAIL_FROM_NAME:-RoomManagerment Zoro}
      RabbitMq__Host: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMq__Port: ${RABBITMQ_PORT:-5672}
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST:-/}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

  # ---------------- FINANCE API (5003) ----------------
  finance-api:
    build:
      context: .
      dockerfile: ./Modules/Finance/Finance.API/Dockerfile
    container_name: rm-finance-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:${FINANCE_API_PORT:-5003}
      ConnectionStrings__Finance: Host=postgres;Port=5432;Database=${FINANCE_DB:-roommanager_finance};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Redis__Configuration: ${REDIS_CONFIGURATION:-redis:6379}
      Finance__Messaging__Enabled: ${FINANCE_MESSAGING_ENABLED:-true}
      RabbitMq__Host: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMq__Port: ${RABBITMQ_PORT:-5672}
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST:-/}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

  # ---------------- EXTERNAL API (5004) ----------------
  external-api:
    build:
      context: .
      dockerfile: ./Api/RoomManagerment.ExternalApi/Dockerfile
    container_name: rm-external-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:${EXTERNAL_API_PORT:-5004}
      RabbitMq__Host: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMq__Port: ${RABBITMQ_PORT:-5672}
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST:-/}
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

  # ---------------- CRM API (5005) ----------------
  crm-api:
    build:
      context: .
      dockerfile: ./Modules/CRM/CRM.API/Dockerfile
    container_name: rm-crm-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:${CRM_API_PORT:-5005}
      ConnectionStrings__CRM: Host=postgres;Port=5432;Database=${CRM_DB:-roommanager_crm};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: ${REDIS_CONFIGURATION:-redis:6379}
      RabbitMq__Host: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMq__Port: ${RABBITMQ_PORT:-5672}
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST:-/}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

  # ---------------- PROPERTY API (5007) ----------------
  property-api:
    build:
      context: .
      dockerfile: ./Modules/Property/Property.API/Dockerfile
    container_name: rm-property-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:${PROPERTY_API_PORT:-5007}
      ConnectionStrings__Property: Host=postgres;Port=5432;Database=${PROPERTY_DB:-roommanager_property};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

  # ---------------- LEASE API (5008) ----------------
  lease-api:
    build:
      context: .
      dockerfile: ./Modules/Lease/Lease.API/Dockerfile
    container_name: rm-lease-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:${LEASE_API_PORT:-5008}
      ConnectionStrings__Lease: Host=postgres;Port=5432;Database=${LEASE_DB:-roommanager_lease};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      RabbitMq__Host: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMq__Port: ${RABBITMQ_PORT:-5672}
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST:-/}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

  # ---------------- ORGANIZATION API (5014) ----------------
  organization-api:
    build:
      context: .
      dockerfile: ./Modules/Organization/Organization.API/Dockerfile
    container_name: rm-organization-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:${ORGANIZATION_API_PORT:-5014}
      ConnectionStrings__Organization: Host=postgres;Port=5432;Database=${ORGANIZATION_DB:-roommanager_organization};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Redis__Configuration: ${REDIS_CONFIGURATION:-redis:6379}
      RabbitMq__Host: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMq__Port: ${RABBITMQ_PORT:-5672}
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST:-/}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

  # ---------------- NOTIFICATION API (5001) ----------------
  notification-api:
    build:
      context: .
      dockerfile: ./Modules/Notification/Notification.API/Dockerfile
    container_name: rm-notification-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:${NOTIFICATION_API_PORT:-5001}
      ConnectionStrings__Notification: Host=postgres;Port=5432;Database=${NOTIFICATION_DB:-roommanager_notification};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      EmailSettings__Host: ${EMAIL_HOST:-smtp.gmail.com}
      EmailSettings__Port: ${EMAIL_PORT:-587}
      EmailSettings__Username: ${EMAIL_USERNAME:-}
      EmailSettings__Password: ${EMAIL_PASSWORD:-}
      EmailSettings__EnableSsl: ${EMAIL_ENABLE_SSL:-true}
      EmailSettings__FromEmail: ${EMAIL_FROM_EMAIL:-}
      EmailSettings__FromName: ${EMAIL_FROM_NAME:-RoomManagerment Zoro}
      RabbitMq__Host: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMq__Port: ${RABBITMQ_PORT:-5672}
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
      RabbitMq__VirtualHost: ${RABBITMQ_VHOST:-/}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

  # ---------------- GATEWAY (5000) ----------------
  gateway:
    build:
      context: .
      dockerfile: ./Api/RoomManagerment.Gateway/Dockerfile
    container_name: rm-gateway
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:${GATEWAY_API_PORT:-5000}
      AUTH_API_URL: ${AUTH_API_URL:-http://auth-api:5002}
      FINANCE_API_URL: ${FINANCE_API_URL:-http://finance-api:5003}
      EXTERNAL_API_URL: ${EXTERNAL_API_URL:-http://external-api:5004}
      NOTIFICATION_API_URL: ${NOTIFICATION_API_URL:-http://notification-api:5001}
      ConnectionStrings__Redis: ${REDIS_CONFIGURATION:-redis:6379}
      Redis__Configuration: ${REDIS_CONFIGURATION:-redis:6379}
      ReverseProxy__Clusters__auth__Destinations__d1__Address: ${AUTH_API_URL:-http://auth-api:5002}
      ReverseProxy__Clusters__finance__Destinations__d1__Address: ${FINANCE_API_URL:-http://finance-api:5003}
      ReverseProxy__Clusters__external__Destinations__d1__Address: ${EXTERNAL_API_URL:-http://external-api:5004}
      ReverseProxy__Clusters__notification__Destinations__d1__Address: ${NOTIFICATION_API_URL:-http://notification-api:5001}
    ports:
      - "${GATEWAY_API_PORT:-5000}:${GATEWAY_API_PORT:-5000}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-api:
        condition: service_started
      finance-api:
        condition: service_started
      external-api:
        condition: service_started
      crm-api:
        condition: service_started
      property-api:
        condition: service_started
      lease-api:
        condition: service_started
      organization-api:
        condition: service_started
      notification-api:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network


  # ---------------- NGINX ----------------
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: rm-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:8080"
      - "${NGINX_HTTPS_PORT:-443}:8443"
    environment:
      WORKER_PROCESSES: ${NGINX_WORKER_PROCESSES:-auto}
      WORKER_CONNECTIONS: ${NGINX_WORKER_CONNECTIONS:-4096}
      ACCESS_LOG_PATH: ${NGINX_ACCESS_LOG_PATH:-/dev/stdout}
      ERROR_LOG_PATH: ${NGINX_ERROR_LOG_PATH:-/dev/stderr}
      LOG_LEVEL: ${NGINX_LOG_LEVEL:-warn}
      GZIP_ENABLED: ${NGINX_GZIP_ENABLED:-on}
      GZIP_MIN_LENGTH: ${NGINX_GZIP_MIN_LENGTH:-1024}
      RATE_LIMIT: ${NGINX_RATE_LIMIT:-10r/s}
      CLIENT_BODY_TIMEOUT: ${NGINX_CLIENT_BODY_TIMEOUT:-10s}
      CLIENT_HEADER_TIMEOUT: ${NGINX_CLIENT_HEADER_TIMEOUT:-10s}
      KEEPALIVE_TIMEOUT: ${NGINX_KEEPALIVE_TIMEOUT:-65s}
      SEND_TIMEOUT: ${NGINX_SEND_TIMEOUT:-10s}
      CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-50M}
    volumes:
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    depends_on:
      - gateway
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

networks:
  rm-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
