pid /tmp/nginx.pid;
worker_processes ${WORKER_PROCESSES:-auto};

events {
    worker_connections ${WORKER_CONNECTIONS:-4096};
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;

    # Nginx needs writable temp paths when running as non-root user.
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '"$http_x_forwarded_for"';

    access_log ${ACCESS_LOG_PATH:-/dev/stdout} main;
    error_log  ${ERROR_LOG_PATH:-/dev/stderr} ${LOG_LEVEL:-warn};

    # gzip
    gzip ${GZIP_ENABLED:-on};
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length ${GZIP_MIN_LENGTH:-1024};

    # rate limit zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=${RATE_LIMIT:-10r/s};

    # Timeouts
    client_body_timeout ${CLIENT_BODY_TIMEOUT:-10s};
    client_header_timeout ${CLIENT_HEADER_TIMEOUT:-10s};
    keepalive_timeout ${KEEPALIVE_TIMEOUT:-65s};
    send_timeout ${SEND_TIMEOUT:-10s};

    # Max upload size
    client_max_body_size ${CLIENT_MAX_BODY_SIZE:-50M};

    include /etc/nginx/conf.d/*.conf;
}
