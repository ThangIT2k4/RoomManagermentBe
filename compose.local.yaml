services:

  # ---------------- REDIS ----------------
  redis:
    image: redis:7-alpine
    container_name: rm-redis
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"   # Dev: truy cap tu host & may cung mang (LAN)
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - rm-network

  # ---------------- POSTGRES ----------------
  postgres:
    image: postgres:18-alpine
    container_name: rm-postgres
    ports:
      - "5433:5432"   # Dev: host port 5433 (tranh conflict voi postgres tren host), container 5432
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rm-network

  # ---------------- IDENTITY API ----------------
  identity-api:
    build:
      context: .
      dockerfile: ./Modules/Identity/Identity.API/Dockerfile
    container_name: rm-identity-api
    env_file:
      - .env.local
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__Identity: ${IDENTITY_CONNECTION_STRING}
      Redis__Host: ${REDIS_HOST}
      Redis__Port: ${REDIS_PORT}
      Redis__Password: ${REDIS_PASSWORD}
      Redis__Database: ${REDIS_DATABASE}
      Redis__Timeout: ${REDIS_TIMEOUT}
      Session__TimeoutMinutes: ${SESSION_TIMEOUT_MINUTES}
      Cors__AllowedOrigins__0: http://localhost:3000
      Cors__AllowedOrigins__1: http://localhost:4200
      Cors__AllowedOrigins__2: http://localhost:5000
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

  # ---------------- EXTERNAL API ----------------
  external-api:
    build:
      context: .
      dockerfile: ./RoomManagerment.ExternalApi/Dockerfile
    container_name: rm-external-api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

  # ---------------- GATEWAY ----------------
  gateway:
    build:
      context: .
      dockerfile: ./RoomManagerment.Gateway/.Dockerfile
    container_name: rm-gateway
    env_file:
      - .env.local
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8000
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__Redis: ${REDIS_HOST}:${REDIS_PORT},password=${REDIS_PASSWORD}
      Redis__InstanceName: ${REDIS_INSTANCE_NAME}
      Session__TimeoutMinutes: ${SESSION_TIMEOUT_MINUTES}
      Session__Cookie__Name: ${SESSION_COOKIE_NAME}
      Cors__AllowedOrigins__0: http://localhost:3000
      Cors__AllowedOrigins__1: http://localhost:4200
      Cors__AllowedOrigins__2: http://localhost:5000
      Kestrel__Limits__MaxRequestBodySize: ${GATEWAY_MAX_REQUEST_BODY_SIZE:-10485760}
      ReverseProxy__Clusters__identity__Destinations__d1__Address: http://identity-api:8080
      ReverseProxy__Clusters__external__Destinations__d1__Address: http://external-api:8080
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - identity-api
      - external-api
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

networks:
  rm-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
