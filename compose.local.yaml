services:

  # ---------------- REDIS ----------------
  redis:
    image: redis:7-alpine
    container_name: rm-redis
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"   # Dev: truy cap tu host & may cung mang (LAN)
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rm-network

  # ---------------- RABBITMQ ----------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rm-rabbitmq
    ports:
      - "5672:5672"     # AMQP port
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rm-network

  # ---------------- POSTGRES ----------------
  postgres:
    image: postgres:18-alpine
    container_name: rm-postgres
    ports:
      - "5433:5432"   # Dev: host port 5433 (tranh conflict voi postgres tren host), container 5432
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rm-network

  # ---------------- IDENTITY API ----------------
  identity-api:
    build:
      context: .
      dockerfile: ./Modules/Identity/Identity.API/Dockerfile
    container_name: rm-identity-api
    env_file:
      - .env.local
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:${IDENTITY_API_PORT}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__Identity: ${IDENTITY_CONNECTION_STRING}
      Redis__Host: ${REDIS_HOST}
      Redis__Port: ${REDIS_PORT}
      Redis__Password: ${REDIS_PASSWORD}
      Redis__Database: ${REDIS_DATABASE}
      Redis__Timeout: ${REDIS_TIMEOUT}
      Session__TimeoutMinutes: ${SESSION_TIMEOUT_MINUTES}
      Cors__AllowedOrigins__0: http://localhost:3000
      Cors__AllowedOrigins__1: http://localhost:4200
      Cors__AllowedOrigins__2: http://localhost:5000
      RabbitMq__Host: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMq__Port: 5672
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
      RabbitMq__VirtualHost: /
    ports:
      - "${IDENTITY_API_PORT}:${IDENTITY_API_PORT}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

  # ---------------- EXTERNAL API ----------------
  external-api:
    build:
      context: .
      dockerfile: ./Api/RoomManagerment.ExternalApi/Dockerfile
    container_name: rm-external-api
    env_file:
      - .env.local
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:${EXTERNAL_API_PORT}
      RabbitMq__Host: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMq__Port: 5672
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
      RabbitMq__VirtualHost: /
    ports:
      - "${EXTERNAL_API_PORT}:${EXTERNAL_API_PORT}"
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

  # ---------------- NOTIFICATION API ----------------
  notification-api:
    build:
      context: .
      dockerfile: ./Modules/Notification/Notification.API/Dockerfile
    container_name: rm-notification-api
    env_file:
      - .env.local
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:${NOTIFICATION_API_PORT}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__Notification: ${NOTIFICATION_CONNECTION_STRING}
      LOG_BASE_PATH: ${LOG_BASE_PATH:-/app/logs}
      RabbitMq__Host: ${RABBITMQ_HOST:-rabbitmq}
      RabbitMq__Port: 5672
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
      RabbitMq__VirtualHost: /
    ports:
      - "${NOTIFICATION_API_PORT}:${NOTIFICATION_API_PORT}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

  # ---------------- GATEWAY ----------------
  gateway:
    build:
      context: .
      dockerfile: ./Api/RoomManagerment.Gateway/Dockerfile
    container_name: rm-gateway
    env_file:
      - .env.local
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:${GATEWAY_API_PORT}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__Redis: ${REDIS_HOST}:${REDIS_PORT},password=${REDIS_PASSWORD}
      Redis__Configuration: ${REDIS_HOST}:${REDIS_PORT}
      Redis__InstanceName: ${REDIS_INSTANCE_NAME}
      Session__TimeoutMinutes: ${SESSION_TIMEOUT_MINUTES}
      Session__Cookie__Name: ${SESSION_COOKIE_NAME}
      Cors__AllowedOrigins__0: http://localhost:3000
      Cors__AllowedOrigins__1: http://localhost:4200
      Cors__AllowedOrigins__2: http://localhost:5000
      Kestrel__Limits__MaxRequestBodySize: ${GATEWAY_MAX_REQUEST_BODY_SIZE:-10485760}
      ReverseProxy__Clusters__identity__Destinations__d1__Address: http://identity-api:${IDENTITY_API_PORT}
      ReverseProxy__Clusters__external__Destinations__d1__Address: http://external-api:${EXTERNAL_API_PORT}
      ReverseProxy__Clusters__notification__Destinations__d1__Address: http://notification-api:${NOTIFICATION_API_PORT}
    ports:
      - "${GATEWAY_API_PORT}:${GATEWAY_API_PORT}"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      identity-api:
        condition: service_started
      external-api:
        condition: service_started
      notification-api:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    networks:
      - rm-network

networks:
  rm-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
