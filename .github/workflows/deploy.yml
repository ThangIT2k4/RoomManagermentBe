# Gateway không ProjectReference tới các module API — runtime gọi qua YARP (HTTP).
# Workflow này publish từng API riêng; trên server cần chạy đủ service + env ReverseProxy trỏ đúng host:port.

name: Deploy RoomManagerment BE

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish APIs (Gateway + backends YARP)
        run: |
          dotnet publish Api/RoomManagerment.Gateway/RoomManagerment.Gateway.csproj -c Release -o publish/gateway
          dotnet publish Modules/Auth/Auth.API/Auth.API.csproj -c Release -o publish/auth-api
          dotnet publish Modules/Finance/Finance.API/Finance.API.csproj -c Release -o publish/finance-api
          dotnet publish Api/RoomManagerment.ExternalApi/RoomManagerment.ExternalApi.csproj -c Release -o publish/external-api
          dotnet publish Modules/Notification/Notification.API/Notification.API.csproj -c Release -o publish/notification-api

      - name: Ensure directories on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /var/www/myapp /var/www/auth-api /var/www/finance-api /var/www/external-api /var/www/notification-api

      - name: Copy Gateway → /var/www/myapp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/gateway/*"
          target: "/var/www/myapp"

      - name: Copy Auth API
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/auth-api/*"
          target: "/var/www/auth-api"

      - name: Copy Finance API
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/finance-api/*"
          target: "/var/www/finance-api"

      - name: Copy External API
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/external-api/*"
          target: "/var/www/external-api"

      - name: Copy Notification API
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/notification-api/*"
          target: "/var/www/notification-api"

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            systemctl restart myapp
            sleep 3
            systemctl is-active --quiet myapp || exit 1
