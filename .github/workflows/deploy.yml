name: Deploy RoomManagerment BE

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # ================= BUILD =================
      - name: Publish all services
        run: |
          dotnet publish Api/RoomManagerment.Gateway/RoomManagerment.Gateway.csproj -c Release -o publish/gateway

          dotnet publish Modules/Auth/Auth.API/Auth.API.csproj -c Release -o publish/auth-api
          dotnet publish Modules/Finance/Finance.API/Finance.API.csproj -c Release -o publish/finance-api
          dotnet publish Modules/Organization/Organization.API/Organization.API.csproj -c Release -o publish/organization-api
          dotnet publish Modules/Property/Property.API/Property.API.csproj -c Release -o publish/property-api
          dotnet publish Modules/Lease/Lease.API/Lease.API.csproj -c Release -o publish/lease-api
          dotnet publish Modules/Notification/Notification.API/Notification.API.csproj -c Release -o publish/notification-api
          dotnet publish Api/RoomManagerment.ExternalApi/RoomManagerment.ExternalApi.csproj -c Release -o publish/external-api

      # ================= CLEAN =================
      - name: Clean old files on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            rm -rf /var/www/gateway/*
            rm -rf /var/www/auth-api/*
            rm -rf /var/www/finance-api/*
            rm -rf /var/www/organization-api/*
            rm -rf /var/www/property-api/*
            rm -rf /var/www/lease-api/*
            rm -rf /var/www/notification-api/*
            rm -rf /var/www/external-api/*

      # ================= COPY =================
      - name: Copy Gateway
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/gateway/*"
          target: "/var/www/gateway"

      - name: Copy Auth
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/auth-api/*"
          target: "/var/www/auth-api"

      - name: Copy Finance
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/finance-api/*"
          target: "/var/www/finance-api"

      - name: Copy Organization
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/organization-api/*"
          target: "/var/www/organization-api"

      - name: Copy Property
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/property-api/*"
          target: "/var/www/property-api"

      - name: Copy Lease
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/lease-api/*"
          target: "/var/www/lease-api"

      - name: Copy Notification
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/notification-api/*"
          target: "/var/www/notification-api"

      - name: Copy External
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/external-api/*"
          target: "/var/www/external-api"

      # ================= RESTART =================
      - name: Restart all services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            systemctl daemon-reload
            systemctl restart gateway auth-api finance-api organization-api property-api lease-api notification-api external-api
            sleep 5
            systemctl is-active --quiet gateway || exit 1