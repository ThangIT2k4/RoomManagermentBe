name: Deploy RoomManagerment BE

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # ================= BUILD =================
      - name: Publish all services
        run: |
          dotnet publish Api/RoomManagerment.Gateway/RoomManagerment.Gateway.csproj -c Release -o publish/gateway
          dotnet publish Modules/Auth/Auth.API/Auth.API.csproj -c Release -o publish/auth-api
          dotnet publish Modules/Finance/Finance.API/Finance.API.csproj -c Release -o publish/finance-api
          dotnet publish Modules/Organization/Organization.API/Organization.API.csproj -c Release -o publish/organization-api
          dotnet publish Modules/Property/Property.API/Property.API.csproj -c Release -o publish/property-api
          dotnet publish Modules/Lease/Lease.API/Lease.API.csproj -c Release -o publish/lease-api
          dotnet publish Modules/Notification/Notification.API/Notification.API.csproj -c Release -o publish/notification-api
          dotnet publish Modules/CRM/CRM.API/CRM.API.csproj -c Release -o publish/crm-api
          dotnet publish Api/RoomManagerment.ExternalApi/RoomManagerment.ExternalApi.csproj -c Release -o publish/external-api

      # ================= PREPARE VERSION =================
      - name: Generate release name
        id: vars
        run: echo "RELEASE_NAME=release-$(date +%s)" >> $GITHUB_OUTPUT

      # ================= COPY =================
      - name: Copy to server (release folder)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/*"
          target: "/var/www/releases/${{ steps.vars.outputs.RELEASE_NAME }}"

      # ================= DEPLOY =================
      - name: Activate release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            RELEASE=/var/www/releases/${{ steps.vars.outputs.RELEASE_NAME }}

            echo "Deploying $RELEASE"

            # ================= VERIFY =================
            for svc in gateway auth-api finance-api organization-api property-api lease-api notification-api crm-api external-api
            do
              if [ ! -d "$RELEASE/publish/$svc" ]; then
                echo "❌ Missing folder: $RELEASE/publish/$svc"
                exit 1
              fi
            done

            # ================= SYMLINK =================
            ln -sfn $RELEASE/publish/gateway /var/www/gateway
            ln -sfn $RELEASE/publish/auth-api /var/www/auth-api
            ln -sfn $RELEASE/publish/finance-api /var/www/finance-api
            ln -sfn $RELEASE/publish/organization-api /var/www/organization-api
            ln -sfn $RELEASE/publish/property-api /var/www/property-api
            ln -sfn $RELEASE/publish/lease-api /var/www/lease-api
            ln -sfn $RELEASE/publish/notification-api /var/www/notification-api
            ln -sfn $RELEASE/publish/crm-api /var/www/crm-api
            ln -sfn $RELEASE/publish/external-api /var/www/external-api

            # ================= RESTART =================
            systemctl daemon-reload

            for svc in gateway auth-api finance-api organization-api property-api lease-api notification-api crm-api external-api
            do
              echo "Restarting $svc..."

              systemctl restart $svc

              # wait max 10s
              for i in {1..10}; do
                if systemctl is-active --quiet $svc; then
                  echo "✅ $svc running"
                  break
                fi
                sleep 1
              done

              if ! systemctl is-active --quiet $svc; then
                echo "❌ $svc failed"
                journalctl -u $svc -n 20 --no-pager
                exit 1
              fi
            done

            echo "🎉 Deploy success"